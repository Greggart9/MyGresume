<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1400;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bgGrad)" />

  <!-- Document body -->
  <rect x="9" y="7" width="13" height="17" rx="1.5" ry="1.5" fill="url(#iconGrad)" opacity="0.15" />
  <rect x="9" y="7" width="13" height="17" rx="1.5" ry="1.5" fill="none" stroke="url(#iconGrad)" stroke-width="1.2" />

  <!-- Folded corner -->
  <path d="M18 7 L22 11 L18 11 Z" fill="url(#iconGrad)" opacity="0.6" />
  <path d="M18 7 L22 11 L18 11 Z" fill="none" stroke="url(#iconGrad)" stroke-width="0.8" />

  <!-- Text lines -->
  <line x1="11.5" y1="14" x2="19.5" y2="14" stroke="url(#iconGrad)" stroke-width="1.2" stroke-linecap="round" />
  <line x1="11.5" y1="16.5" x2="19.5" y2="16.5" stroke="url(#iconGrad)" stroke-width="1.2" stroke-linecap="round" />
  <line x1="11.5" y1="19" x2="16.5" y2="19" stroke="url(#iconGrad)" stroke-width="1.2" stroke-linecap="round" />
</svg>
